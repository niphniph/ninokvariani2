        .nav-link-hover {

        }
        .nav-link-hover::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #e9c176;
            transition: width 0.3s ease;

            width: 100%;

        .nav-link-hover:hover {
            color: #E9C176 !important;
        }

            transition: all 300ms ease;

            transition: transform 500ms ease;
        }

            transform: scale(1.05);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-500 { animation-delay: 500ms; }

            opacity: 0;
            transform: translateY(20px);

        // =========================================================
        //  Apply translations (text + placeholders)
        // =========================================================
        function applyTranslations(lang) {
            const dict = translations[lang];
            if (!dict) return;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key] !== undefined) {
                    el.textContent = dict[key];
                }
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (dict[key] !== undefined) {
                    el.placeholder = dict[key];
                }
            });
            document.documentElement.lang = lang;
        }

        function updateLangButtons(lang) {
            ['ka', 'en'].forEach(l => {
                const desktopBtn = document.getElementById('btn-' + l + '-desktop');
                const mobileBtn  = document.getElementById('btn-' + l + '-mobile');
                if (desktopBtn) desktopBtn.classList.toggle('active', l === lang);
                if (mobileBtn)  mobileBtn.classList.toggle('active',  l === lang);
            });
        }

        function setLanguage(lang) {
            localStorage.setItem('gip_lang', lang);
            applyTranslations(lang);
            updateLangButtons(lang);
        }

        // =========================================================
        //  Init
        // =========================================================
        document.addEventListener("DOMContentLoaded", () => {
            // Language init
            const savedLang = localStorage.getItem('gip_lang') || 'ka';
            applyTranslations(savedLang);
            updateLangButtons(savedLang);

            // Scroll fade-in for footer
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.fade-in-on-scroll').forEach(el => observer.observe(el));
        });

        function toggleMobileMenu() {
            const drawer = document.getElementById('mobile-drawer');
            if (drawer.classList.contains('hidden')) {
                drawer.classList.remove('hidden');
                setTimeout(() => { drawer.classList.remove('opacity-0'); }, 10);
            } else {
                drawer.classList.add('opacity-0');
                setTimeout(() => { drawer.classList.add('hidden'); }, 300);
            }
        }

        function openApplyModal(programName) {
            const lang = document.documentElement.lang || 'ka';
            const prefix = translations[lang]?.modal_applying_for || 'Applying for: ';
            document.getElementById('modal-program-subtitle').innerText = prefix + programName;
            document.getElementById('modal-program-input').value = programName;
            const modal = document.getElementById('apply-modal');
            modal.classList.remove('hidden');
        }

        function closeApplyModal() {
            document.getElementById('apply-modal').classList.add('hidden');
            document.getElementById('apply-form').reset();
        }

        function submitApplication(event) {
            event.preventDefault();
            const form = event.target;
            const application = {
                id: Date.now(),
                name: form.name.value,
                email: form.email.value,
                program: form.program.value,
                statement: form.statement.value,
                status: 'Pending',
                date: new Date().toLocaleDateString()
            };

            let apps = JSON.parse(localStorage.getItem('gip_applications') || '[]');
            apps.push(application);
            localStorage.setItem('gip_applications', JSON.stringify(apps));

            const lang = document.documentElement.lang || 'ka';
            const msg = lang === 'ka'
                ? 'მადლობა! თქვენი განაცხადი "' + application.program + '" გაიგზავნა.'
                : 'Thank you! Your registration application for "' + application.program + '" has been submitted.';
            alert(msg);
            closeApplyModal();
        }

        // =========================================================
        //  Apply translations
        // =========================================================
        function applyTranslations(lang) {
            const dict = translations[lang];
            if (!dict) return;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key] !== undefined) {
                    el.textContent = dict[key];
                }
            });
            document.documentElement.lang = lang;
        }

        // =========================================================
        //  Update language button active state
        // =========================================================
        function updateLangButtons(lang) {
            ['ka', 'en'].forEach(l => {
                const desktopBtn = document.getElementById('btn-' + l + '-desktop');
                const mobileBtn  = document.getElementById('btn-' + l + '-mobile');
                if (desktopBtn) desktopBtn.classList.toggle('active', l === lang);
                if (mobileBtn)  mobileBtn.classList.toggle('active',  l === lang);
            });
        }

        // =========================================================
        //  Set language and persist
        // =========================================================
        function setLanguage(lang) {
            localStorage.setItem('gip_lang', lang);
            applyTranslations(lang);
            updateLangButtons(lang);
        }

        // =========================================================
        //  Init on load
        // =========================================================
        document.addEventListener('DOMContentLoaded', () => {
            // Language init
            const savedLang = localStorage.getItem('gip_lang') || 'ka';
            applyTranslations(savedLang);
            updateLangButtons(savedLang);

            // Scroll fade-in
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in-up').forEach((elem) => {
                observer.observe(elem);
            });
        });

        function toggleMobileMenu() {
            const drawer = document.getElementById('mobile-drawer');
            if (drawer.classList.contains('hidden')) {
                drawer.classList.remove('hidden');
                setTimeout(() => {
                    drawer.classList.remove('opacity-0');
                }, 10);
            } else {
                drawer.classList.add('opacity-0');
                setTimeout(() => {
                    drawer.classList.add('hidden');
                }, 300);
            }
        }
